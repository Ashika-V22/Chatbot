<!DOCTYPE html>
<!--
  templates/index.html
  ─────────────────────────────────────────────────────────────────
  This is the chat interface. It's a single HTML file that contains:
    • HTML  → structure (chat bubbles, input box, buttons)
    • CSS   → styling (dark terminal theme, animations)
    • JS    → behaviour (send messages, display responses, typing effect)

  Flask's render_template() serves this file and passes in the
  welcome message via the {{ welcome }} template variable.
  ─────────────────────────────────────────────────────────────────
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberShield — Security Awareness Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Variables — edit these to retheme the whole app ── */
    :root {
      --bg:          #0a0e1a;
      --panel:       #0f1628;
      --border:      #1a3a5c;
      --accent:      #00d4ff;
      --accent2:     #00ff88;
      --danger:      #ff3860;
      --warn:        #ffdd57;
      --text:        #c8d8e8;
      --text-dim:    #5a7a9a;
      --bot-bubble:  #0d1f35;
      --user-bubble: #003d26;
      --mono:        'Share Tech Mono', monospace;
      --sans:        'Rajdhani', sans-serif;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Subtle scanline overlay for terminal feel */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,212,255,0.015) 2px,
        rgba(0,212,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Header ── */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0,212,255,0.3);
      animation: pulse-logo 3s ease-in-out infinite;
    }

    @keyframes pulse-logo {
      0%, 100% { box-shadow: 0 0 16px rgba(0,212,255,0.3); }
      50%       { box-shadow: 0 0 28px rgba(0,212,255,0.6); }
    }

    .brand h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .brand p {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent2);
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.2);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--accent2);
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Quick Action Buttons ── */
    .quick-actions {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }

    .quick-actions::-webkit-scrollbar { display: none; }

    .qa-btn {
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .qa-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,212,255,0.06);
    }

    /* ── Chat Window ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* Scrollbar styling */
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Chat Bubbles ── */
    .message {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fade-up 0.3s ease both;
      max-width: 820px;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.bot .avatar {
      background: rgba(0,212,255,0.12);
      border: 1px solid rgba(0,212,255,0.3);
    }

    .message.user .avatar {
      background: rgba(0,255,136,0.12);
      border: 1px solid rgba(0,255,136,0.3);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 10px;
      line-height: 1.65;
      font-size: 0.93rem;
      max-width: calc(100% - 42px);
      word-break: break-word;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 2px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(0,255,136,0.2);
      border-top-right-radius: 2px;
      color: #b0ffd6;
      font-family: var(--mono);
      font-size: 0.85rem;
    }

    /* Inline HTML from bot (bold, line breaks) */
    .bubble b    { color: var(--accent); }
    .bubble i    { color: var(--text-dim); }
    .bubble br   { display: block; margin-bottom: 2px; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: typing-bounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input Area ── */
    .input-area {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
      caret-color: var(--accent);
    }

    #user-input::placeholder { color: var(--text-dim); }

    #user-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
    }

    .send-btn {
      background: linear-gradient(135deg, #005a7a, #003d55);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .send-btn:hover {
      background: linear-gradient(135deg, var(--accent), #0090bb);
      color: #000;
    }

    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── Footer ── */
    .footer-note {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      padding: 6px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .brand p { display: none; }
      .send-btn { padding: 10px 12px; }
    }
  </style>
</head>

<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <div class="header-left">
      <div class="logo">🛡️</div>
      <div class="brand">
        <h1>CyberShield</h1>
        <p>// SECURITY AWARENESS TERMINAL v1.0</p>
      </div>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      ACTIVE
    </div>
  </header>

  <!-- ── Quick Action Buttons ────────────────────────────────── -->
  <div class="quick-actions">
    <button class="qa-btn" onclick="sendQuick('quiz')">📝 Quiz</button>
    <button class="qa-btn" onclick="sendQuick('phishing test')">🎣 Phishing Test</button>
    <button class="qa-btn" onclick="sendQuick('incident')">🚨 Report Incident</button>
    <button class="qa-btn" onclick="sendQuick('phishing')">🎣 What is Phishing</button>
    <button class="qa-btn" onclick="sendQuick('malware')">🦠 What is Malware</button>
    <button class="qa-btn" onclick="sendQuick('ransomware')">🔒 Ransomware</button>
    <button class="qa-btn" onclick="sendQuick('ddos')">💥 DDoS</button>
    <button class="qa-btn" onclick="sendQuick('sql injection')">💉 SQL Injection</button>
    <button class="qa-btn" onclick="sendQuick('social engineering')">🎭 Social Eng.</button>
    <button class="qa-btn" onclick="sendQuick('brute force')">🔨 Brute Force</button>
    <button class="qa-btn" onclick="sendQuick('keylogger')">⌨️ Keylogger</button>
    <button class="qa-btn" onclick="sendQuick('zero day')">☠️ Zero Day</button>
  </div>

  <!-- ── Chat Window ─────────────────────────────────────────── -->
  <div id="chat-window">
    <!--
      The welcome message is injected here by Flask via the
      {{ welcome | safe }} template variable.
      '| safe' tells Flask to render the HTML tags, not escape them.
    -->
    <div class="message bot">
      <div class="avatar">🛡️</div>
      <div class="bubble">{{ welcome | safe }}</div>
    </div>
  </div>

  <!-- ── Input Area ──────────────────────────────────────────── -->
  <div class="input-area">
    <input
      type="text"
      id="user-input"
      placeholder="Type a message, threat name, or command..."
      autocomplete="off"
      autofocus
    />
    <button class="send-btn" onclick="sendMessage()">SEND ▶</button>
    <button class="reset-btn" onclick="resetChat()" title="Reset conversation">↺</button>
  </div>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <div class="footer-note">
    ⚠️ For educational purposes only &nbsp;|&nbsp; Never share passwords or OTPs with anyone
  </div>


  <!-- ── JavaScript ─────────────────────────────────────────── -->
  <script>
    /*
     * This JavaScript handles:
     *   1. Sending messages to the Flask /chat endpoint
     *   2. Displaying user messages and bot replies as chat bubbles
     *   3. Showing a typing indicator while waiting for the bot
     *   4. Quick-action button shortcuts
     *   5. Enter key support
     */

    const chatWindow = document.getElementById('chat-window');
    const inputEl    = document.getElementById('user-input');

    // ── Send message on Enter key ──────────────────────────────
    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── Quick action buttons ───────────────────────────────────
    function sendQuick(text) {
      inputEl.value = text;
      sendMessage();
    }

    // ── Main send function ─────────────────────────────────────
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      // 1. Show the user's message in the chat
      appendMessage('user', text);
      inputEl.value = '';

      // 2. Show a "typing..." indicator while waiting
      const typingId = showTyping();

      try {
        // 3. Send the message to Flask via POST request
        //    Flask returns { "response": "bot reply HTML" }
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        // 4. Remove typing indicator and show bot reply
        removeTyping(typingId);
        appendMessage('bot', data.response || data.error || 'Something went wrong.');

      } catch (err) {
        // Network error — Flask not running?
        removeTyping(typingId);
        appendMessage('bot', '❌ Could not reach the server. Is Flask running?');
      }
    }

    // ── Reset conversation ─────────────────────────────────────
    async function resetChat() {
      try {
        const res  = await fetch('/reset', { method: 'POST' });
        const data = await res.json();
        chatWindow.innerHTML = ''; // Clear all messages
        appendMessage('bot', data.response);
      } catch (err) {
        appendMessage('bot', '❌ Reset failed. Please refresh the page.');
      }
    }

    // ── Append a message bubble to the chat window ─────────────
    function appendMessage(role, htmlContent) {
      /*
       * role: 'bot' or 'user'
       * htmlContent: the message text (bot messages can contain HTML)
       */
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'bot' ? '🛡️' : '👤';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'bot') {
        // Bot messages may contain safe HTML (bold, line breaks)
        bubble.innerHTML = htmlContent;
      } else {
        // User messages are always plain text (prevents XSS)
        bubble.textContent = htmlContent;
      }

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      chatWindow.appendChild(wrapper);

      // Auto-scroll to the newest message
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ── Typing indicator ───────────────────────────────────────
    function showTyping() {
      const id = 'typing-' + Date.now();

      const wrapper = document.createElement('div');
      wrapper.className = 'message bot';
      wrapper.id = id;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🛡️';

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing-indicator';
      bubble.innerHTML = '<span></span><span></span><span></span>';

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;

      return id;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }
  </script>

</body>
</html>
